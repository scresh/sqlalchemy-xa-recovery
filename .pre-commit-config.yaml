repos:
- repo: local
  hooks:
    - id: ruff-check
      name: ruff check
      entry: ruff check --fix --config pyproject.toml
      language: system
      types: [python]

    - id: ruff-format
      name: ruff format
      entry: ruff format --config pyproject.toml
      language: system
      types: [python]

    - id: ty
      name: ty check
      entry: ty check .
      language: system
      pass_filenames: false
      always_run: true